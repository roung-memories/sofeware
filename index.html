<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2c3e50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>中文朗读练习</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>中文朗读</h1>
            <button id="btn-settings" class="btn-settings" onclick="showSettings()" title="设置 API 密钥">⚙️</button>
        </header>

        <main>
            <div id="page-today" class="page active"></div>
            <div id="page-history" class="page"></div>
            <div id="page-detail" class="page"></div>
        </main>

        <nav id="bottom-nav" class="bottom-nav">
            <a href="#today" class="nav-link active">
                <span class="nav-icon">📖</span>
                <span class="nav-label">今日</span>
            </a>
            <a href="#history" class="nav-link">
                <span class="nav-icon">📋</span>
                <span class="nav-label">历史</span>
            </a>
        </nav>
    </div>

    <div id="recording-bar" class="recording-bar">
        <div class="recording-bar-left">
            <span class="recording-dot"></span>
            <span id="recording-bar-timer" class="recording-bar-timer">00:00</span>
        </div>
        <span class="recording-bar-label">录音中</span>
        <button id="btn-stop-recording" class="btn btn-stop-rec" onclick="stopRecording()">
            <span class="stop-icon">■</span>
            停止
        </button>
    </div>

    <div id="toast" class="toast hidden"></div>

    <div id="settings-overlay" class="settings-overlay hidden">
        <div class="settings-modal">
            <h2>设置</h2>
            <p style="font-size:0.85em;color:#888;margin-bottom:12px;">
                输入你的 DeepSeek API 密钥，用于生成朗读素材。
            </p>
            <input type="password" id="settings-api-key" placeholder="sk-..." />
            <button class="btn btn-primary" onclick="saveApiKey()" id="btn-save-key" style="width:100%;margin-top:12px;">
                保存
            </button>
            <p id="settings-status" style="font-size:0.82em;margin-top:8px;"></p>
        </div>
    </div>

    <script src="js/lib/lame.min.js"></script>
    <script src="js/audio-utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/db.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/components/recorder.js"></script>
    <script src="js/components/player.js"></script>
    <script src="js/pages/today.js"></script>
    <script src="js/pages/history.js"></script>
    <script src="js/pages/detail.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
